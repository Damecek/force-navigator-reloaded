name: CI
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "web/**"
      - "webpack.config.js"
      - "lwc.config.json"
      - "package.json"
      - "package-lock.json"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run lint
      - run: npm run build
